[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "snapline-api-adapters"
version = "0.2.1"
description = "REST, GraphQL, and SOAP API adapters for Snapline"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [{ name = "VaagaTech", email = "info@vaagatech.com" }]
dependencies = [
    "snapline-engine==0.2.1",
    "httpx>=0.27.0",
]

[project.urls]
Homepage = "https://github.com/vaagatech/snapline-python"
Documentation = "https://vaagatech.github.io/snapline-python/"
Repository = "https://github.com/vaagatech/snapline-python"
Issues = "https://github.com/vaagatech/snapline-python/issues"

[tool.hatch.build.targets.wheel]
packages = ["snapline"]
