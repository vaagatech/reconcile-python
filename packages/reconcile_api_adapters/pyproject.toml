[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "reconcile-api-adapters"
version = "0.1.6"
description = "REST, GraphQL, and SOAP API adapters for Reconcile"
license = "MIT"
requires-python = ">=3.10"
authors = [{ name = "VaagaTech", email = "info@vaagatech.com" }]
dependencies = [
    "reconcile-engine==0.1.6",
    "httpx>=0.27.0",
]

[project.urls]
Homepage = "https://github.com/vaagatech/reconcile-python"
Repository = "https://github.com/vaagatech/reconcile-python"

[tool.hatch.build.targets.wheel]
packages = ["reconcile"]
