[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "reconcile-auth-adapters"
version = "0.1.5"
description = "Basic, OAuth2, and OpenID auth adapters for Reconcile"
license = "MIT"
requires-python = ">=3.10"
authors = [{ name = "VaagaTech", email = "info@vaagatech.com" }]
dependencies = [
    "httpx>=0.27.0",
]

[project.urls]
Homepage = "https://github.com/vaagatech/reconcile-python"
Repository = "https://github.com/vaagatech/reconcile-python"

[tool.hatch.build.targets.wheel]
packages = ["reconcile"]
