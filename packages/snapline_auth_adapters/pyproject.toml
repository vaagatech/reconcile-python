[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "snapline-auth-adapters"
version = "0.1.10"
description = "Basic, OAuth2, and OpenID auth adapters for Snapline"
license = "MIT"
requires-python = ">=3.10"
authors = [{ name = "VaagaTech", email = "info@vaagatech.com" }]
dependencies = [
    "httpx>=0.27.0",
]

[project.urls]
Homepage = "https://github.com/vaagatech/snapline-python"
Repository = "https://github.com/vaagatech/snapline-python"

[tool.hatch.build.targets.wheel]
packages = ["snapline"]
