# Publish library packages to PyPI on semver tags (v1.2.3).
#
# Requires repository secret PYPI_API_TOKEN.
# PyPI project names must match pyproject.toml exactly (hyphens, not underscores):
#   snapline-engine
#   snapline-auth-adapters
#   snapline-api-adapters
#   snapline-core
#
# Repository: https://github.com/vaagatech/snapline-python

name: Publish to PyPI

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

jobs:
  validate-tag:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Check tag format
        id: extract
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}$ ]]; then
            echo "Tag '$tag' must match v{1,3}.{1,3}.{1,3} (for example v0.1.5)."
            exit 1
          fi
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish ${{ matrix.package_name }}
    needs: validate-tag
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        include:
          - package_dir: packages/snapline_engine
            package_name: snapline-engine
          - package_dir: packages/snapline_auth_adapters
            package_name: snapline-auth-adapters
          - package_dir: packages/snapline_api_adapters
            package_name: snapline-api-adapters
          - package_dir: packages/snapline_core
            package_name: snapline-core
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify PyPI API token is configured
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "$PYPI_API_TOKEN" ]; then
            echo "::error::Repository secret PYPI_API_TOKEN is not set."
            exit 1
          fi

      - name: Verify package version matches tag
        env:
          RELEASE_VERSION: ${{ needs.validate-tag.outputs.version }}
        run: |
          package_version="$(grep -E '^version = ' "${{ matrix.package_dir }}/pyproject.toml" | head -1 | sed -E 's/^version = "([^"]+)"/\1/')"
          if [ "$package_version" != "$RELEASE_VERSION" ]; then
            echo "Tag version $RELEASE_VERSION does not match ${{ matrix.package_name }} version $package_version."
            echo "Run: python scripts/sync_versions.py --version $RELEASE_VERSION"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build "${{ matrix.package_dir }}"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ matrix.package_dir }}/dist
          password: ${{ secrets.PYPI_API_TOKEN }}
