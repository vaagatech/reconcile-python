# Publish library packages to PyPI on semver tags (v1.2.3).
#
# Release flow:
#   1. Push tag v0.1.11 (versions in repo may still be on the previous dev version)
#   2. Workflow syncs all pyproject.toml files to the tag version, builds, and publishes
#   3. After all packages publish, bumps patch version and commits to main for the next dev cycle
#
# Requires repository secret PYPI_API_TOKEN.
# PyPI project names: snapline-engine, snapline-auth-adapters,
#                     snapline-api-adapters, snapline-core

name: Publish to PyPI

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: read

jobs:
  validate-tag:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Check tag format
        id: extract
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}$ ]]; then
            echo "Tag '$tag' must match v{1,3}.{1,3}.{1,3} (for example v0.1.5)."
            exit 1
          fi
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish ${{ matrix.package_name }}
    needs: validate-tag
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        include:
          - package_dir: packages/snapline_engine
            package_name: snapline-engine
          - package_dir: packages/snapline_auth_adapters
            package_name: snapline-auth-adapters
          - package_dir: packages/snapline_api_adapters
            package_name: snapline-api-adapters
          - package_dir: packages/snapline_core
            package_name: snapline-core
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify PyPI API token is configured
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "$PYPI_API_TOKEN" ]; then
            echo "::error::Repository secret PYPI_API_TOKEN is not set."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync versions from tag
        run: python scripts/sync_versions.py --version "${{ needs.validate-tag.outputs.version }}"

      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build "${{ matrix.package_dir }}"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ matrix.package_dir }}/dist
          password: ${{ secrets.PYPI_API_TOKEN }}

  bump-version:
    name: Bump development version
    needs:
      - validate-tag
      - publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bump to next patch version
        run: |
          python scripts/sync_versions.py --version "${{ needs.validate-tag.outputs.version }}"
          python scripts/sync_versions.py --bump-patch

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml packages/*/pyproject.toml demo/shared/pyproject.toml
          if git diff --staged --quiet; then
            echo "No version changes to commit."
            exit 0
          fi
          next_version="$(grep -E '^version = ' pyproject.toml | head -1 | sed -E 's/^version = "([^"]+)"/\1/')"
          git commit -m "chore: bump version to ${next_version} after publishing v${{ needs.validate-tag.outputs.version }}"
          git push
