# Publish library packages to PyPI on semver tags (v1.2.3).
#
# Trusted publishing (recommended): add a publisher on EACH PyPI project
# (reconcile-engine, reconcile-auth-adapters, reconcile-api-adapters, reconcile-core):
#   Owner:        vaagatech
#   Repository:   reconcile-python
#   Workflow:     publish-pypi.yml
#   Environment:  pypi
#
# Also create a GitHub repository environment named "pypi" under Settings → Environments.
#
# Alternative: set repository secret PYPI_API_TOKEN (account or per-project token).

name: Publish to PyPI

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

jobs:
  validate-tag:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Check tag format
        id: extract
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}$ ]]; then
            echo "Tag '$tag' must match v{1,3}.{1,3}.{1,3} (for example v0.1.5)."
            exit 1
          fi
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish ${{ matrix.package_name }}
    needs: validate-tag
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/${{ matrix.package_name }}
    permissions:
      id-token: write
      contents: read
    strategy:
      max-parallel: 1
      matrix:
        include:
          - package_dir: packages/reconcile_engine
            package_name: reconcile-engine
          - package_dir: packages/reconcile_auth_adapters
            package_name: reconcile-auth-adapters
          - package_dir: packages/reconcile_api_adapters
            package_name: reconcile-api-adapters
          - package_dir: packages/reconcile_core
            package_name: reconcile-core
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify package version matches tag
        env:
          RELEASE_VERSION: ${{ needs.validate-tag.outputs.version }}
        run: |
          package_version="$(grep -E '^version = ' "${{ matrix.package_dir }}/pyproject.toml" | head -1 | sed -E 's/^version = "([^"]+)"/\1/')"
          if [ "$package_version" != "$RELEASE_VERSION" ]; then
            echo "Tag version $RELEASE_VERSION does not match ${{ matrix.package_name }} version $package_version."
            echo "Run: python scripts/sync_versions.py --version $RELEASE_VERSION"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build "${{ matrix.package_dir }}"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ matrix.package_dir }}/dist
          password: ${{ secrets.PYPI_API_TOKEN }}
