name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install -e packages/snapline_engine \
            -e packages/snapline_api_adapters \
            -e packages/snapline_auth_adapters \
            -e packages/snapline_messaging_adapters \
            -e packages/snapline_core \
            -e demo/shared \
            pytest
      - name: Run tests
        run: pytest tests -q
      - name: Run demo
        run: python demo/run_all/run_all.py
